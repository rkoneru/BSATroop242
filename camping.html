<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Troop — Into the Wild</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cycle: 12s;
    --day-bg: #87ceeb;
    --night-bg: #0f0f1e;
    --sun-color: #FFD700;
    --moon-color: #fffde7;
  }

  html, body {
    width: 100%; height: 100vh;
    overflow: hidden;
    font-family: 'Crimson Pro', serif;
  }

  /* ─── SCENE WRAPPER ─── */
  .scene {
    position: relative;
    width: 100%; height: 100vh;
    overflow: hidden;
  }

  /* ─── GRADIENT SKY ─── */
  .sky {
    position: absolute; inset: 0;
    background: linear-gradient(
      to right,
      #87ceeb 0%,
      #87ceeb 45%,
      #b0d8f0 55%,
      #fbb26a 65%,
      #d9704e 72%,
      #6a3d7c 80%,
      #1a1a3e 90%,
      #0f0f1e 100%
    );
    animation: skyShift var(--cycle) ease-in-out infinite;
  }

  @keyframes skyShift {
    0%,10%   { filter: brightness(1); }
    70%      { filter: brightness(0.85); }
    80%      { filter: brightness(0.5); }
    96%      { filter: brightness(0.15); }
    100%     { filter: brightness(1); }
  }

  /* ─── SUN ─── */
  .sun {
    position: absolute;
    width: 70px; height: 70px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #fff7aa, #FFD700 40%, #ffa500);
    box-shadow: 0 0 60px 20px #ffa500, 0 0 120px 40px rgba(255,165,0,0.4);
    animation: sunArc var(--cycle) ease-in-out infinite;
    transform-origin: center;
    will-change: transform, opacity;
  }

  @keyframes sunArc {
    /* Start bottom-left: left≈3%, bottom≈0 → top:auto → translate */
    0%   { left: 2%;  top: 92%; opacity: 1;  transform: scale(0.7); }
    10%  { left: 8%;  top: 68%; opacity: 1;  transform: scale(0.9); }
    25%  { left: 18%; top: 38%; opacity: 1;  transform: scale(1);   }
    40%  { left: 30%; top: 14%; opacity: 1;  transform: scale(1.05);}
    55%  { left: 45%; top: 6%;  opacity: 1;  transform: scale(1.05);}
    68%  { left: 60%; top: 8%;  opacity: 1;  transform: scale(1);   }
    75%  { left: 68%; top: 4%;  opacity: 0.7; transform: scale(0.85);}
    78%  { left: 72%; top: 2%;  opacity: 0;  transform: scale(0.5); }
    100% { left: 72%; top: 2%;  opacity: 0;  transform: scale(0.5); }
  }

  /* Sun rays */
  .sun::before {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: transparent;
    box-shadow:
      0 -28px 0 4px rgba(255,220,0,0.3),
      0  28px 0 4px rgba(255,220,0,0.3),
     -28px 0  0 4px rgba(255,220,0,0.3),
      28px 0  0 4px rgba(255,220,0,0.3),
     -20px -20px 0 4px rgba(255,220,0,0.2),
      20px -20px 0 4px rgba(255,220,0,0.2),
     -20px  20px 0 4px rgba(255,220,0,0.2),
      20px  20px 0 4px rgba(255,220,0,0.2);
    animation: rayPulse 2s ease-in-out infinite alternate;
  }

  @keyframes rayPulse {
    from { opacity: 0.6; transform: rotate(0deg); }
    to   { opacity: 1;   transform: rotate(22.5deg); }
  }

  /* ─── MOON ─── */
  .moon {
    position: absolute;
    width: 55px; height: 55px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fffde7, #f0e68c 60%, #d4c560);
    box-shadow: 0 0 40px 15px #f0e68c, 0 0 80px 30px rgba(240,230,140,0.3);
    animation: moonDrop var(--cycle) ease-in-out infinite;
    will-change: transform, opacity;
  }

  /* Crescent shadow */
  .moon::after {
    content: '';
    position: absolute;
    width: 42px; height: 42px;
    background: #1a1840;
    border-radius: 50%;
    top: -5px; left: 10px;
    opacity: 0.7;
  }

  @keyframes moonDrop {
    0%   { left: 72%; top: 2%;  opacity: 0; }
    77%  { left: 72%; top: 2%;  opacity: 0; }
    78%  { left: 72%; top: 2%;  opacity: 1; }
    88%  { left: 73%; top: 45%; opacity: 1; }
    95%  { left: 74%; top: 88%; opacity: 0.6; }
    96%  { left: 74%; top: 96%; opacity: 0; }
    100% { left: 74%; top: 96%; opacity: 0; }
  }

  /* ─── STARS ─── */
  .stars {
    position: absolute; inset: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--t, 3s) ease-in-out infinite;
    animation-delay: var(--d, 0s);
    opacity: 0;
  }

  @keyframes twinkle {
    0%,100% { opacity: 0;   transform: scale(0.5); }
    50%     { opacity: 1;   transform: scale(1.5); }
  }

  /* Stars only visible in right portion — achieved via left positioning */

  /* ─── GROUND ─── */
  .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 22%;
  }

  .ground-day {
    position: absolute;
    bottom: 0; left: 0;
    width: 78%;
    height: 100%;
    background: linear-gradient(180deg, #4a8c2a 0%, #2d5a1b 40%, #1e3d12 100%);
    clip-path: polygon(0 30%, 4% 20%, 8% 28%, 14% 15%, 20% 25%, 28% 18%, 35% 28%, 42% 22%, 50% 30%, 58% 20%, 65% 28%, 72% 18%, 78% 25%, 100% 20%, 100% 100%, 0 100%);
  }

  .ground-night {
    position: absolute;
    bottom: 0; right: 0;
    width: 28%;
    height: 100%;
    background: linear-gradient(180deg, #1a2e10 0%, #0d1a08 40%, #060e04 100%);
    clip-path: polygon(0 20%, 10% 28%, 20% 18%, 30% 26%, 45% 15%, 60% 24%, 75% 18%, 88% 26%, 100% 20%, 100% 100%, 0 100%);
  }

  /* ─── TREES ─── */
  .tree {
    position: absolute;
    bottom: 0;
    transform-origin: bottom center;
  }

  /* Pine SVG trees embedded as inline */

  /* ─── TENTS ─── */
  .tent {
    position: absolute;
    bottom: 0;
  }

  /* ─── COMPASS ROSE ─── */
  .compass-wrap {
    position: absolute;
    bottom: 28%; left: 14%;
    width: 110px; height: 110px;
    animation: compassSpin 30s linear infinite;
  }

  @keyframes compassSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .compass-wrap .labels {
    position: absolute; inset: 0;
    animation: compassSpin 30s linear infinite reverse; /* counter-rotate labels */
  }

  /* ─── SCOUT FIGURE ─── */
  .scout {
    position: absolute;
    bottom: 20%;
    left: 24%;
    width: 40px;
    animation: scoutBob 4s ease-in-out infinite;
  }

  @keyframes scoutBob {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-5px); }
  }

  /* ─── DEER ─── */
  .deer {
    position: absolute;
    bottom: 20.5%;
    left: 38%;
    width: 55px;
    animation: deerWalk 8s ease-in-out infinite alternate;
  }

  @keyframes deerWalk {
    from { transform: translateX(0) scaleX(1); }
    to   { transform: translateX(60px) scaleX(1); }
  }

  /* ─── CONTENT PANELS ─── */
  .panel {
    position: absolute;
    top: 8%; 
    padding: 20px 24px;
    border-radius: 12px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    max-width: 260px;
  }

  .panel-day {
    left: 3%;
    background: rgba(255,255,255,0.22);
    border: 1px solid rgba(255,255,255,0.4);
    color: #1a2e0d;
  }

  .panel-day h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    line-height: 1.2;
    color: #1a3a08;
    text-shadow: 0 1px 3px rgba(255,255,255,0.6);
    margin-bottom: 6px;
  }

  .panel-day p {
    font-size: 0.95rem;
    line-height: 1.5;
    color: #2a4a10;
    font-style: italic;
  }

  .panel-night {
    right: 0.5%;
    width: 24%;
    background: rgba(0,0,20,0.45);
    border: 1px solid rgba(255,255,255,0.12);
    color: #e8e0ff;
    top: 6%;
  }

  .panel-night h2 {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #f0e68c;
    margin-bottom: 6px;
    letter-spacing: 0.08em;
  }

  .panel-night p {
    font-size: 0.85rem;
    line-height: 1.5;
    color: #ccc8ee;
    font-style: italic;
  }

  .badge {
    display: inline-block;
    margin-top: 10px;
    padding: 4px 12px;
    background: rgba(255,200,50,0.15);
    border: 1px solid rgba(255,200,50,0.5);
    border-radius: 20px;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: #ffe77a;
  }

  /* ─── NIGHT SCOUTS ─── */
  .night-scouts {
    position: absolute;
    bottom: 21%;
    right: 1%;
    display: flex;
    gap: 8px;
  }

  /* ─── CAMPFIRE GLOW ─── */
  .fire-glow {
    position: absolute;
    width: 80px; height: 40px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,120,0,0.7) 0%, transparent 70%);
    animation: fireFlicker 0.8s ease-in-out infinite alternate;
  }

  @keyframes fireFlicker {
    from { opacity: 0.7; transform: scaleX(1); }
    to   { opacity: 1;   transform: scaleX(1.15); }
  }

  /* ─── DIVIDER HINT ─── */
  .twilight-band {
    position: absolute;
    top: 0; bottom: 0;
    left: 72%; width: 8%;
    background: linear-gradient(to right, transparent, rgba(100,80,180,0.08), transparent);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="scene">

  <!-- Sky -->
  <div class="sky"></div>

  <!-- Stars (right 30% of viewport) -->
  <div class="stars" id="stars"></div>

  <!-- Twilight soft band -->
  <div class="twilight-band"></div>

  <!-- Sun -->
  <div class="sun"></div>

  <!-- Moon -->
  <div class="moon"></div>

  <!-- SVG Scenery Layer -->
  <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">

    <!-- ═══ GROUND ═══ -->
    <!-- Day ground -->
    <defs>
      <linearGradient id="groundDay" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#5a9e38"/>
        <stop offset="50%" stop-color="#3a6e20"/>
        <stop offset="100%" stop-color="#22430f"/>
      </linearGradient>
      <linearGradient id="groundNight" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a2e0e"/>
        <stop offset="60%" stop-color="#0c1808"/>
        <stop offset="100%" stop-color="#050c03"/>
      </linearGradient>
      <radialGradient id="fireGlow" cx="50%" cy="100%" r="50%">
        <stop offset="0%" stop-color="rgba(255,140,0,0.8)"/>
        <stop offset="100%" stop-color="rgba(255,140,0,0)"/>
      </radialGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="softGlow">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

      <!-- Tent lit window gradient -->
      <radialGradient id="tentLight" cx="50%" cy="80%" r="60%">
        <stop offset="0%" stop-color="rgba(255,200,80,0.9)"/>
        <stop offset="100%" stop-color="rgba(255,200,80,0)"/>
      </radialGradient>
    </defs>

    <!-- Day ground -->
    <path d="M0,660 Q80,640 160,650 Q240,640 320,648 Q400,636 480,644 Q560,634 640,642 Q720,632 800,640 Q880,632 960,638 Q1040,630 1080,635 L1080,800 L0,800 Z" fill="url(#groundDay)"/>
    <!-- Night ground -->
    <path d="M1060,640 Q1120,632 1180,638 Q1240,630 1300,636 Q1360,630 1440,636 L1440,800 L1060,800 Z" fill="url(#groundNight)"/>

    <!-- Ground texture lines day -->
    <g opacity="0.15" stroke="#2d5a1b" stroke-width="1" fill="none">
      <path d="M20,680 Q200,672 400,678 Q600,672 800,677"/>
      <path d="M0,700 Q200,694 380,699 Q560,692 760,698 Q900,694 1050,698"/>
    </g>

    <!-- ═══ PINE TREES — DAY ═══ -->
    <!-- Tree 1 -->
    <g transform="translate(60,640)">
      <rect x="-6" y="-20" width="12" height="28" fill="#5c3d1e"/>
      <polygon points="0,-130 -45,-30 45,-30" fill="#2d7a1f"/>
      <polygon points="0,-105 -38,-15 38,-15" fill="#38922a"/>
      <polygon points="0,-80 -30,0 30,0" fill="#45a835"/>
    </g>
    <!-- Tree 2 -->
    <g transform="translate(135,638)">
      <rect x="-5" y="-18" width="10" height="25" fill="#5c3d1e"/>
      <polygon points="0,-110 -38,-28 38,-28" fill="#256b18"/>
      <polygon points="0,-88 -32,-12 32,-12" fill="#2e8020"/>
      <polygon points="0,-65 -25,0 25,0" fill="#3a9428"/>
    </g>
    <!-- Tree 3 (taller) -->
    <g transform="translate(220,635)">
      <rect x="-7" y="-22" width="14" height="30" fill="#4a3018"/>
      <polygon points="0,-148 -52,-35 52,-35" fill="#1e6012"/>
      <polygon points="0,-118 -44,-18 44,-18" fill="#267518"/>
      <polygon points="0,-88 -36,0 36,0" fill="#30871e"/>
    </g>
    <!-- Tree 4 -->
    <g transform="translate(510,636)">
      <rect x="-6" y="-20" width="12" height="26" fill="#5c3d1e"/>
      <polygon points="0,-128 -44,-30 44,-30" fill="#28721a"/>
      <polygon points="0,-100 -36,-15 36,-15" fill="#32872a"/>
      <polygon points="0,-74 -28,0 28,0" fill="#3c9830"/>
    </g>
    <!-- Tree 5 -->
    <g transform="translate(590,638)">
      <rect x="-5" y="-18" width="10" height="22" fill="#5c3d1e"/>
      <polygon points="0,-105 -36,-25 36,-25" fill="#226015"/>
      <polygon points="0,-82 -30,-10 30,-10" fill="#2a7220"/>
      <polygon points="0,-60 -24,0 24,0" fill="#348428"/>
    </g>

    <!-- ═══ TENTS — DAY ═══ -->
    <!-- Tent A (green, day) -->
    <g transform="translate(330,638)">
      <!-- tent body -->
      <polygon points="0,-75 -55,0 55,0" fill="#4a7a30" stroke="#3a6020" stroke-width="1.5"/>
      <!-- tent highlight -->
      <polygon points="0,-75 -20,-10 0,-5" fill="rgba(255,255,255,0.1)"/>
      <!-- tent door -->
      <path d="M-8,0 Q0,-22 8,0 Z" fill="#2a4a18"/>
      <!-- tent line -->
      <line x1="0" y1="-75" x2="0" y2="-82" stroke="#8B4513" stroke-width="2"/>
      <line x1="0" y1="-82" x2="-20" y2="-60" stroke="#8B4513" stroke-width="1.5" stroke-dasharray="3,2"/>
      <line x1="0" y1="-82" x2="20" y2="-60" stroke="#8B4513" stroke-width="1.5" stroke-dasharray="3,2"/>
    </g>

    <!-- Tent B (orange, day) -->
    <g transform="translate(430,636)">
      <polygon points="0,-68 -48,0 48,0" fill="#c05a20" stroke="#9a4518" stroke-width="1.5"/>
      <polygon points="0,-68 -18,-8 2,-4" fill="rgba(255,255,255,0.12)"/>
      <path d="M-7,0 Q0,-20 7,0 Z" fill="#7a3410"/>
      <line x1="0" y1="-68" x2="0" y2="-76" stroke="#8B4513" stroke-width="2"/>
    </g>

    <!-- ═══ COMPASS ROSE ═══ -->
    <g transform="translate(200,490)" filter="url(#glow)">
      <!-- outer ring -->
      <circle cx="0" cy="0" r="52" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="48" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
      <!-- tick marks -->
      <g stroke="rgba(255,255,255,0.6)" stroke-width="1">
        <line x1="0" y1="-48" x2="0" y2="-42"/>
        <line x1="0" y1="42" x2="0" y2="48"/>
        <line x1="-48" y1="0" x2="-42" y2="0"/>
        <line x1="42" y1="0" x2="48" y2="0"/>
        <!-- diagonals -->
        <line x1="30" y1="-30" x2="34" y2="-34"/>
        <line x1="-30" y1="-30" x2="-34" y2="-34"/>
        <line x1="30" y1="30" x2="34" y2="34"/>
        <line x1="-30" y1="30" x2="-34" y2="34"/>
      </g>
      <!-- North needle (red) -->
      <polygon points="0,-40 -7,0 0,-8 7,0" fill="#d9382a"/>
      <!-- South needle (white) -->
      <polygon points="0,40 -7,0 0,8 7,0" fill="rgba(255,255,255,0.9)"/>
      <!-- East/West blades -->
      <polygon points="40,0 0,-6 8,0 0,6" fill="rgba(255,255,255,0.75)"/>
      <polygon points="-40,0 0,-6 -8,0 0,6" fill="rgba(255,255,255,0.75)"/>
      <!-- center -->
      <circle cx="0" cy="0" r="5" fill="white" stroke="#aaa" stroke-width="1"/>
      <!-- Cardinal letters -->
      <text x="0" y="-56" text-anchor="middle" fill="white" font-family="Cinzel,serif" font-size="12" font-weight="700">N</text>
      <text x="0" y="68" text-anchor="middle" fill="white" font-family="Cinzel,serif" font-size="12" font-weight="700">S</text>
      <text x="60" y="4" text-anchor="middle" fill="white" font-family="Cinzel,serif" font-size="12" font-weight="700">E</text>
      <text x="-60" y="4" text-anchor="middle" fill="white" font-family="Cinzel,serif" font-size="12" font-weight="700">W</text>
      <!-- Animated compass spin wrapper (the arrow rotates) -->
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- ═══ SCOUT FIGURE (Day) ═══ -->
    <g transform="translate(320,638)">
      <!-- body -->
      <rect x="-8" y="-52" width="16" height="28" rx="4" fill="#4a6a20"/>
      <!-- head -->
      <circle cx="0" cy="-60" r="11" fill="#f5c28a"/>
      <!-- hat (scout hat) -->
      <ellipse cx="0" cy="-69" rx="12" ry="4" fill="#5a4020"/>
      <rect x="-7" y="-74" width="14" height="8" rx="3" fill="#6a5025"/>
      <!-- legs -->
      <rect x="-8" y="-24" width="7" height="24" rx="3" fill="#4a6a20"/>
      <rect x="1" y="-24" width="7" height="24" rx="3" fill="#4a6a20"/>
      <!-- boots -->
      <ellipse cx="-5" cy="0" rx="6" ry="4" fill="#3a2810"/>
      <ellipse cx="5" cy="0" rx="6" ry="4" fill="#3a2810"/>
      <!-- arm raised pointing at compass -->
      <line x1="-8" y1="-44" x2="-32" y2="-52" stroke="#4a6a20" stroke-width="7" stroke-linecap="round"/>
      <!-- arm down -->
      <line x1="8" y1="-44" x2="14" y2="-28" stroke="#4a6a20" stroke-width="7" stroke-linecap="round"/>
      <!-- neck scarf -->
      <path d="M-7,-52 Q0,-44 7,-52" fill="none" stroke="#e85820" stroke-width="4"/>
    </g>

    <!-- ═══ DEER ═══ -->
    <g transform="translate(560,638)">
      <animateTransform attributeName="transform" type="translate" values="560,638; 640,638; 560,638" dur="12s" repeatCount="indefinite" additive="replace"/>
      <!-- body -->
      <ellipse cx="0" cy="-18" rx="24" ry="14" fill="#b5763a"/>
      <!-- neck -->
      <rect x="-4" y="-35" width="10" height="18" rx="4" fill="#b5763a"/>
      <!-- head -->
      <ellipse cx="4" cy="-40" rx="10" ry="8" fill="#c4884a"/>
      <!-- snout -->
      <ellipse cx="12" cy="-38" rx="5" ry="4" fill="#d49a5a"/>
      <!-- eye -->
      <circle cx="8" cy="-42" r="2" fill="#1a1008"/>
      <!-- ear -->
      <polygon points="0,-44 -8,-54 2,-46" fill="#b5763a"/>
      <!-- antlers -->
      <line x1="-2" y1="-48" x2="-10" y2="-62" stroke="#8B4513" stroke-width="2.5"/>
      <line x1="-10" y1="-62" x2="-4" y2="-70" stroke="#8B4513" stroke-width="2"/>
      <line x1="-10" y1="-62" x2="-16" y2="-68" stroke="#8B4513" stroke-width="2"/>
      <line x1="2" y1="-47" x2="10" y2="-60" stroke="#8B4513" stroke-width="2.5"/>
      <line x1="10" y1="-60" x2="16" y2="-68" stroke="#8B4513" stroke-width="2"/>
      <line x1="10" y1="-60" x2="4" y2="-67" stroke="#8B4513" stroke-width="2"/>
      <!-- legs -->
      <line x1="-14" y1="-8" x2="-16" y2="0" stroke="#9a6030" stroke-width="5" stroke-linecap="round"/>
      <line x1="-6" y1="-6" x2="-6" y2="0" stroke="#9a6030" stroke-width="5" stroke-linecap="round"/>
      <line x1="6" y1="-6" x2="7" y2="0" stroke="#9a6030" stroke-width="5" stroke-linecap="round"/>
      <line x1="14" y1="-8" x2="16" y2="0" stroke="#9a6030" stroke-width="5" stroke-linecap="round"/>
      <!-- tail -->
      <ellipse cx="-24" cy="-18" rx="5" ry="7" fill="white"/>
    </g>

    <!-- ═══ NIGHT TREES ═══ -->
    <!-- Tree N1 -->
    <g transform="translate(1120,636)">
      <rect x="-5" y="-18" width="10" height="24" fill="#2a1e0e"/>
      <polygon points="0,-120 -38,-28 38,-28" fill="#0e2808"/>

<script>
  // Generate stars dynamically
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 140; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    // Stars in right 30% of viewport
    const leftPct = 70 + Math.random() * 30;
    const topPct = Math.random() * 75;
    const size = 1 + Math.random() * 3;
    const dur = 1.5 + Math.random() * 4;
    const del = Math.random() * 5;
    s.style.cssText = `
      left:${leftPct}%;
      top:${topPct}%;
      width:${size}px;
      height:${size}px;
      --t:${dur}s;
      --d:${del}s;
    `;
    starsEl.appendChild(s);
  }
</script>
